apiVersion: apps/v1
kind: Deployment
metadata:
  name: automotive-app
  labels:
    app: automotive-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: automotive-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: automotive-app
    spec:
      containers:
        - name: automotive-app
          image: 'anshmundra/automotive-app:latest'
          ports:
            - containerPort: 5000
          env:
            - name: TAVILY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: autoverse-secrets
                  key: TAVILY_API_KEY
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: autoverse-secrets
                  key: GROQ_API_KEY
          readinessProbe: